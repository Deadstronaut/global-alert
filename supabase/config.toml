
# spec 017: the only Edge Function in this project with verify_jwt = false,
# deliberately — it must be reachable by a direct click from an email client
# with no bearer token available (research.md). See ack-dispatch/index.ts.
[functions.ack-dispatch]
enabled = true
verify_jwt = false
entrypoint = "./functions/ack-dispatch/index.ts"

# spec 031: same rationale as ack-dispatch — a one-click unsubscribe link
# clicked directly from an email client, no bearer token available.
[functions.unsubscribe]
enabled = true
verify_jwt = false
entrypoint = "./functions/unsubscribe/index.ts"

[functions.generate-compliance-report]
enabled = true
verify_jwt = true
entrypoint = "./functions/generate-compliance-report/index.ts"

# spec 040: scheduled import, invoked by pg_cron with a service-role bearer
# token (trigger_osm_roads_import()) — same convention as
# import-kontur-population (spec 038), verify_jwt stays at the project
# default (true). Explicit entry added because an earlier manual deploy
# accidentally set verify_jwt=false and a bare redeploy did not reset it.
[functions.import-osm-roads]
enabled = true
verify_jwt = true
entrypoint = "./functions/import-osm-roads/index.ts"

# spec 041 — same explicit-verify_jwt convention as import-osm-roads above.
[functions.import-hydrorivers]
enabled = true
verify_jwt = true
entrypoint = "./functions/import-hydrorivers/index.ts"

[functions.import-hydrobasins]
enabled = true
verify_jwt = true
entrypoint = "./functions/import-hydrobasins/index.ts"

# spec 043 — same explicit-verify_jwt convention as import-osm-roads above.
[functions.import-worldpop]
enabled = true
verify_jwt = true
entrypoint = "./functions/import-worldpop/index.ts"

# spec 036 remaining item: live SSE notification stream. Uses the caller's own
# JWT (not service-role) so existing community_reports RLS applies as-is.
[functions.community-reports-stream]
enabled = true
verify_jwt = true
entrypoint = "./functions/community-reports-stream/index.ts"

[functions.fetch-historical-events]
enabled = true
verify_jwt = true
import_map = "./functions/fetch-historical-events/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/fetch-historical-events/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/fetch-historical-events/*.html" ]
