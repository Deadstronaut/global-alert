# MHEWS — Docker Compose
#
# 3 parça: frontend (statik) + aggregator (Node) + DB.
# DB katmanı bu dosyada YOK — Supabase CLI ile yönetiliyor:
#   Cloud müşteri:      Supabase Cloud projesine bağlan (server/.env içindeki
#                        SUPABASE_URL / SUPABASE_SERVICE_ROLE_KEY ile).
#   Self-host müşteri:  `supabase start` (bkz. supabase/config.toml) DB+auth+
#                        realtime+studio stack'ini ayrıca ayağa kaldırır;
#                        aggregator ve frontend bu compose ile, DB Supabase
#                        CLI ile yönetilir. Migration'lar: `supabase db push`.
#
# Kullanım:
#   docker compose up -d

services:

  # ── GEWS Real-time Aggregator ──────────────────────────────────────────────
  aggregator:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mhews-aggregator
    restart: unless-stopped
    ports:
      - "8765:8765"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    networks:
      - mhews

  # ── Vue Frontend (static build) ────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: mhews-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/ssl/mhews:ro        # mount your certs here
    networks:
      - mhews

networks:
  mhews:
    driver: bridge
